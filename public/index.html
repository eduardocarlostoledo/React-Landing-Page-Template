  <!-- ═══════════════════════════════════════════════════════════════════════
       SECURITY HEADERS (meta-level)
       Nota: HSTS y X-Frame-Options DEBEN configurarse en el servidor web
       (nginx/Apache/Vercel/Netlify). Estas metas cubren el 40% restante.
       Ver: /public/.well-known/security.txt  (RFC 9116)
       ═══════════════════════════════════════════════════════════════════════ -->

  <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  REMEDIACIONES PENDIENTES EN EL SERVIDOR (fuera de este HTML)
    ║  CRÍTICO — OWASP A05 / NIS2 Art.21 / DORA Art.9
    ║
    ║  1. Strict-Transport-Security: max-age=31536000; includeSubDomains; preload
    ║  2. X-Frame-Options: DENY
    ║  3. X-Content-Type-Options: nosniff
    ║  4. Set-Cookie: __session=...; Secure; HttpOnly; SameSite=Strict
    ║  5. Crear /public/.well-known/security.txt (RFC 9116)
    ╚══════════════════════════════════════════════════════════════╝
  -->

  <!-- Content-Security-Policy — OWASP A05:2021 / CRA Hardening
       Bloquea XSS inline, limita orígenes de scripts/estilos/imágenes.
       Ajustar 'nonce-...' si se usan scripts inline en producción. -->
  <meta http-equiv="Content-Security-Policy"
    content="
      default-src 'self';
      script-src  'self' https://www.googletagmanager.com https://www.google-analytics.com https://tagmanager.google.com https://cdn.jsdelivr.net https://static.elfsight.com https://core.service.elfsight.com;
      style-src   'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com 'unsafe-inline';
      font-src    'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
      img-src     'self' data: https: blob:;
      connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://api.emailjs.com https://api.elfsight.com https://core.service.elfsight.com;
      frame-src   'self' https://www.google.com https://maps.google.com https://www.googletagmanager.com https://elfsight.com https://*.elfsight.com https://static.elfsight.com https://core.service.elfsight.com;
      object-src  'none';
      base-uri    'self';
      form-action 'self';
      upgrade-insecure-requests;
    " />

  <!-- Referrer-Policy — limita info enviada a terceros (GDPR Art.5) -->
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <!-- Permissions-Policy — deshabilita APIs no usadas (CRA / NIS2) -->
  <meta http-equiv="Permissions-Policy"

  <!-- X-Content-Type-Options fallback -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
